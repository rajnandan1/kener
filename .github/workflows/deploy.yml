name: Deploy to Coolify
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/kener
            git fetch origin main --prune
            git reset --hard origin/main
            docker build -t kener:local \
              --build-arg VARIANT=alpine \
              --build-arg NODE_VERSION=24 \
              --build-arg WITH_DOCS=false \
              --build-arg KENER_BASE_PATH="" \
              -f Dockerfile .
            cd /data/coolify/services/pjn8105j4bqa6m9lvk4my5cw
            docker compose down
            docker compose up -d
            sleep 5
            docker network connect coolify kener-pjn8105j4bqa6m9lvk4my5cw 2>/dev/null || true
