name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Validate compose
        run: docker compose config --quiet

# Deployment is handled by Coolify auto-deploy via GitHub App.
# Pushing to main triggers Coolify to pull and deploy automatically.
