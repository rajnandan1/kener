# =============================================================================
# Kener v4 — Production Docker Compose (Coolify-managed)
#
# Deployed automatically by Coolify via GitHub App on push to main.
# Environment variables are set in Coolify, not in this file.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Redis — required for BullMQ queues, caching, and scheduler
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Kener — Status Page Application
  # ---------------------------------------------------------------------------
  kener:
    image: rajnandan1/kener:latest
    environment:
      KENER_SECRET_KEY: ${KENER_SECRET_KEY:-replace_me}
      ORIGIN: ${ORIGIN:-http://localhost:3000}
      REDIS_URL: redis://redis:6379
      PORT: ${PORT:-3000}
    volumes:
      - data:/app/database
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  data:
    external: true
    name: kener_db
  redis_data:
    external: true
    name: kener_redis
