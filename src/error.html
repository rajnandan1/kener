<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="30" />
    <title>%sveltekit.status% — Status page temporarily unavailable</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #09090b;
        --muted: #71717a;
        --border: #e4e4e7;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #09090b;
          --fg: #fafafa;
          --muted: #a1a1aa;
          --border: #27272a;
        }
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--fg);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
      }
      .card {
        max-width: 28rem;
        margin: 1rem;
        padding: 2rem;
        border: 1px solid var(--border);
        border-radius: 1rem;
        text-align: center;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 0.5rem;
      }
      p {
        color: var(--muted);
        font-size: 0.875rem;
        line-height: 1.5;
        margin: 0.25rem 0;
      }
      .code {
        color: var(--muted);
        font-size: 0.75rem;
        margin-top: 1.25rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>This status page is temporarily unavailable</h1>
      <p>We are having trouble serving this page right now. It usually resolves on its own.</p>
      <p>This page will retry automatically in 30 seconds.</p>
      <div class="code">%sveltekit.status% · %sveltekit.error.message%</div>
    </div>
  </body>
</html>
